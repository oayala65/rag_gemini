<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini PDF Chatbot</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #chat-box { height: 60vh; overflow-y: auto; scroll-behavior: smooth; }
        .user-msg { background-color: #3b82f6; color: white; align-self: flex-end; }
        .ai-msg { background-color: #f3f4f6; color: #1f2937; align-self: flex-start; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800">📄 PDF RAG Chat</h1>
            <p class="text-slate-500">Ask questions about your document using Gemini 1.5</p>
        </header>

        <!-- Configuration Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <label class="block text-sm font-semibold text-slate-700 mb-1">1. Your Gemini API Key</label>
                <input type="password" id="apiKey" placeholder="Paste AIzaSy... key here" 
                    class="w-full p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <label class="block text-sm font-semibold text-slate-700 mb-1">2. Upload PDF Document</label>
                <input type="file" id="pdfFile" accept="application/pdf" 
                    class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
        </div>

        <!-- Chat Display -->
        <div id="chat-box" class="bg-white border border-slate-200 rounded-xl p-4 mb-4 flex flex-col gap-3 shadow-inner">
            <div class="ai-msg p-3 rounded-lg max-w-[80%]">
                Hello! Please enter your API key and upload a PDF to begin.
            </div>
        </div>

        <!-- Input Area -->
        <div class="flex gap-2 bg-white p-2 rounded-xl shadow-md border border-slate-200">
            <input type="text" id="userInput" placeholder="Ask something about the document..." 
                class="flex-1 p-3 outline-none disabled:bg-slate-100 rounded-lg">
            <button onclick="handleQuery()" id="sendBtn" 
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold transition-all disabled:opacity-50">
                Send
            </button>
        </div>
    </div>

    <!-- Load the Gemini SDK using ESM -->
    <script type="importmap">
        {
          "imports": {
            "@google/generative-ai": "https://esm.run/@google/generative-ai"
          }
        }
    </script>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        let pdfData = null;

        // Convert File to Base64 for the Gemini API
        document.getElementById('pdfFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function() {
                pdfData = reader.result.split(',')[1];
                addMessage('ai', `Successfully loaded: <b>${file.name}</b>. You can now ask questions.`);
            };
            reader.readAsDataURL(file);
        });

        // Main Function to Send Data to Gemini
        window.handleQuery = async () => {
            const apiKey = document.getElementById('apiKey').value;
            const prompt = document.getElementById('userInput').value;
            const btn = document.getElementById('sendBtn');

            if (!apiKey) return alert("Please enter your Gemini API Key first.");
            if (!pdfData) return alert("Please upload a PDF file first.");
            if (!prompt.trim()) return;

            // Update UI
            addMessage('user', prompt);
            document.getElementById('userInput').value = '';
            btn.disabled = true;
            const loadingMsg = addMessage('ai', 'Searching document...');

            try {
                const genAI = new GoogleGenerativeAI(apiKey);
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-1.5-flash",
                    systemInstruction: "You are a document assistant. Answer the user's question ONLY using the provided PDF content. If the answer is not in the document, say 'I cannot find that information in the document.' Do not use outside knowledge."
                });

                const result = await model.generateContent([
                    {
                        inlineData: {
                            data: pdfData,
                            mimeType: "application/pdf"
                        }
                    },
                    prompt
                ]);

                const responseText = await result.response.text();
                updateMessage(loadingMsg, responseText);

            } catch (error) {
                updateMessage(loadingMsg, "Error: " + error.message);
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        };

        function addMessage(role, text) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            const id = "msg-" + Date.now();
            msgDiv.id = id;
            msgDiv.className = `p-3 rounded-lg max-w-[85%] ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            msgDiv.innerHTML = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function updateMessage(id, text) {
            document.getElementById(id).innerHTML = text;
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
