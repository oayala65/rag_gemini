<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini PDF Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #chat-box { height: 60vh; overflow-y: auto; scroll-behavior: smooth; }
        .user-msg { background-color: #3b82f6; color: white; align-self: flex-end; border-radius: 12px 12px 2px 12px; }
        .ai-msg { background-color: #f3f4f6; color: #1f2937; align-self: flex-start; border-radius: 12px 12px 12px 2px; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800">📄 PDF RAG Chat</h1>
            <p class="text-slate-500 italic text-sm">Strictly using your PDF content</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <label class="block text-sm font-semibold text-slate-700 mb-1">1. Your Gemini API Key</label>
                <input type="password" id="apiKey" placeholder="AIzaSy..." 
                    class="w-full p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <label class="block text-sm font-semibold text-slate-700 mb-1">2. Upload PDF Document</label>
                <input type="file" id="pdfFile" accept="application/pdf" 
                    class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
        </div>

        <div id="chat-box" class="bg-white border border-slate-200 rounded-xl p-4 mb-4 flex flex-col gap-3 shadow-inner min-h-[300px]">
            <div class="ai-msg p-3 max-w-[80%]">
                Hello! Enter your key and upload a PDF. I will only answer using information from that file.
            </div>
        </div>

        <div class="flex gap-2 bg-white p-2 rounded-xl shadow-md border border-slate-200">
            <input type="text" id="userInput" placeholder="Ask a question..." 
                class="flex-1 p-3 outline-none disabled:bg-slate-100 rounded-lg">
            <button onclick="handleQuery()" id="sendBtn" 
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold transition-all disabled:opacity-50">
                Send
            </button>
        </div>
    </div>

    <!-- SDK IMPORT -->
    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai@0.16.0";

        let pdfData = null;

        // Process PDF to Base64
        document.getElementById('pdfFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function() {
                pdfData = reader.result.split(',')[1];
                addMessage('ai', `✅ Document "<b>${file.name}</b>" is ready.`);
            };
            reader.readAsDataURL(file);
        });

        window.handleQuery = async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const prompt = document.getElementById('userInput').value.trim();
            const btn = document.getElementById('sendBtn');

            if (!apiKey) return alert("Please enter your API Key.");
            if (!pdfData) return alert("Please upload a PDF.");
            if (!prompt) return;

            addMessage('user', prompt);
            document.getElementById('userInput').value = '';
            btn.disabled = true;
            const loadingId = addMessage('ai', 'Thinking...');

            try {
                const genAI = new GoogleGenerativeAI(apiKey);
                
                // Using gemini-1.5-flash-latest to avoid 404 version issues
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash-latest" });

                // Constructing a strict prompt
                const strictPrompt = `
                    INSTRUCTIONS: Use ONLY the following PDF content to answer the question. 
                    If the answer is not in the document, say "I cannot find this in the document."
                    
                    QUESTION: ${prompt}
                `;

                const result = await model.generateContent([
                    {
                        inlineData: {
                            data: pdfData,
                            mimeType: "application/pdf"
                        }
                    },
                    { text: strictPrompt }
                ]);

                const responseText = result.response.text();
                updateMessage(loadingId, responseText);

            } catch (error) {
                console.error(error);
                updateMessage(loadingId, `<span class="text-red-500 italic">Error: ${error.message}</span><br><br><b>Tip:</b> Make sure your API key is correct and valid in Google AI Studio.`);
            } finally {
                btn.disabled = false;
            }
        };

        function addMessage(role, text) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            const id = "msg-" + Date.now();
            msgDiv.id = id;
            msgDiv.className = `p-3 max-w-[85%] ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            msgDiv.innerHTML = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function updateMessage(id, text) {
            const element = document.getElementById(id);
            if (element) element.innerHTML = text;
        }
    </script>
</body>
</html>
